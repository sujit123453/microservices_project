server:
  port: 9090

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      server:
        webmvc:
          routes:

            - id: USER-SERVICE
              uri: lb://USER-SERVICE
              predicates:
                - Path=/user/**
              filters:
                - StripPrefix=1

            - id: PRODUCT-SERVICE
              uri: lb://PRODUCT-SERVICES
              predicates:
                - Path=/product/**


            - id: ORDER-SERVICE
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/orders/**


            - id: PAYMENT-SERVICE
              uri: lb://PAYMENT-SERVICES
              predicates:
                - Path=/payment/**


eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka


